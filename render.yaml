services:
  - type: web
    name: smart-leads-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false          # Set this in Render Dashboard → Environment
      - key: JWT_SECRET
        sync: false          # Set this in Render Dashboard → Environment
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false          # Set to your Vercel frontend URL, e.g. https://smart-leads.vercel.app
    healthCheckPath: /health
